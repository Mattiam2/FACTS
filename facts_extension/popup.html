<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACTS Extension</title>
    <link rel="stylesheet" href="includes/material-icons.css"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="ambient-bg"></div>
<div class="header">
    <div class="logo-container">
        <div class="logo-f">F</div>
        <span class="brand-name">FACTS</span>
    </div>
    <div class="status-badge" id="status-text">EBSI Verified</div>
</div>

<div class="container">

    <div id="main-content">
        <div class="loading-state" id="loading-view">
            <div class="spinner"></div>
            <span>Looking on EBSI...</span>
        </div>

        <div id="article-view" style="display: none;" class="card">
            <div id="article-title">
                Page not claimed yet on FACTS
            </div>
            <div id="publisher-view" style="display: none;" class="card">
                <div id="publisher-icon" class="material-symbols-outlined">
                    verified_user
                </div>
                <div id="publisher-title">
                    <span>
                        Publisher Info
                    </span>
                </div>
                <div>
                    <b>DID</b>: <span id="publisher-did"></span>
                </div>
                <div>
                    <b>Company</b>: <span id="publisher-company"></span>
                </div>
                <div>
                    <b>Website</b>: <span id="publisher-website"></span>
                </div>
            </div>
        </div>
        <div id="assessments-view" style="display: none;" class="card">
            <div class="stats-grid">
                <div class="gauge-wrapper">
                    <span class="gauge-label">Credibility</span>
                    <svg class="gauge-svg" viewBox="0 0 100 60">
                        <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50"/>
                        <path id="credibility-gauge" class="gauge-fill" d="M 10 50 A 40 40 0 0 1 90 50"/>
                        <text x="50" y="45" text-anchor="middle" class="gauge-value" id="credibility-avg-score"></text>
                    </svg>
                    <h3 id="credibility-description"></h3>
                </div>

                <div class="gauge-wrapper">
                    <span class="gauge-label">Manipulation</span>
                    <svg class="gauge-svg" viewBox="0 0 100 60">
                        <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50"/>
                        <path id="manipulation-gauge" class="gauge-fill" d="M 10 50 A 40 40 0 0 1 90 50"/>
                        <text x="50" y="45" text-anchor="middle" class="gauge-value" id="manipulation-avg-score"></text>
                    </svg>
                    <h3 id="manipulation-description"></h3>
                </div>
            </div>
            Based on <span id="assessments-number"></span> assessments
        </div>
        <div id="assessments-not-found-view" style="display: none;" class="card">
            <div>
                No fact-checking assessments found
            </div>
        </div>
    </div>

    <div id="actions" style="display: flex; gap: 10px">
        <button id="view-details"
                style="display: none;">
            More details
        </button>
        <button id="view-facts">
            Open FACTS
        </button>
    </div>

</div>

<div class="footer">
    FACTS v1.0 | Powered by EBSI & SSI
</div>

<script src="popup.js"></script>
</body>
</html>
